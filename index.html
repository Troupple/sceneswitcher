<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OBS Slide Switcher</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    margin: 0;
    background: transparent;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  #slide {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1s ease;
    position: absolute;
    top: 0; left: 0;
  }

  #error {
    display: none;
    position: fixed;
    bottom: 52px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: #ff4466;
    font-size: 13px;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border-radius: 0;
    border: 1px solid rgba(255,68,102,0.5);
    backdrop-filter: blur(8px);
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
  }

  #subtitle {
    display: none;
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: #ffffff;
    font-size: 16px;
    letter-spacing: 0.05em;
    padding: 8px 14px;
    border-radius: 0;
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    white-space: nowrap;
    z-index: 100;
    cursor: pointer;
    pointer-events: auto;
  }
</style>
</head>
<body>

<img id="slide" src="" alt="">

<div id="error"></div>
<div id="subtitle" aria-live="polite"></div>

<script>
const subtitlesEnabled = false; // set false to disable subtitle display

players.forEach((player, index) => {
  player.number = index + 1;
});

document.addEventListener("keydown", (e) => {
  const digit = e.key;
  if (/^[0-9]$/.test(digit)) {
    numberBuffer += digit;
    if (numberBuffer.length > 2) {
      numberBuffer = numberBuffer.slice(-2);
    }
    if (numberBufferTimeout) clearTimeout(numberBufferTimeout);
    numberBufferTimeout = setTimeout(() => {
      handleNumberInput(numberBuffer);
      numberBuffer = "";
      numberBufferTimeout = null;
    }, 400);
    if (numberBuffer.length === 2) {
      handleNumberInput(numberBuffer);
      numberBuffer = "";
      if (numberBufferTimeout) {
        clearTimeout(numberBufferTimeout);
        numberBufferTimeout = null;
      }
    }
    return;
  }
  if (numberBuffer) {
    handleNumberInput(numberBuffer);
    numberBuffer = "";
    if (numberBufferTimeout) {
      clearTimeout(numberBufferTimeout);
      numberBufferTimeout = null;
    }
  }
});

const slide    = document.getElementById("slide");
const errorEl  = document.getElementById("error");
const subtitleEl = document.getElementById("subtitle");

let hideTimeout = null;
let subtitleTimeout = null;
let numberBuffer = "";
let numberBufferTimeout = null;

function handleNumberInput(str) {
  if (!str) return;
  const num = parseInt(str, 10);
  if (Number.isFinite(num) && num >= 1 && num <= players.length) {
    const player = players[num - 1];
    showSlide(player.file, player.name);
  }
}

subtitleEl.addEventListener("click", async () => {
  const text = subtitleEl.textContent || "";
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    subtitleEl.textContent = "Copied!";
    if (subtitleTimeout) clearTimeout(subtitleTimeout);
    subtitleTimeout = setTimeout(() => {
      subtitleEl.style.display = "none";
    }, 1200);
  } catch (err) {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);
  }
});

function showError(msg) {
  errorEl.textContent = "⚠ " + msg;
  errorEl.style.display = "block";
}

function setSubtitle(text, active = false) {
  if (!subtitlesEnabled) return;
  subtitleEl.textContent = text;
  subtitleEl.style.display = "block";
  subtitleEl.style.background = active ? "rgba(20,120,20,0.9)" : "rgba(0,0,0,0.75)";
  subtitleEl.style.border = active ? "1px solid rgba(120,255,120,0.6)" : "1px solid rgba(255,255,255,0.2)";
  if (subtitleTimeout) clearTimeout(subtitleTimeout);
  subtitleTimeout = setTimeout(() => {
    subtitleEl.style.display = "none";
  }, 1800);
}

function showSlide(src, name = "") {
  slide.src = src;
  slide.alt = name;
  slide.style.opacity = "1";
  if (hideTimeout) clearTimeout(hideTimeout);
  hideTimeout = setTimeout(() => {
    slide.style.opacity = "0";
  }, 10000);
}



const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (!SpeechRecognition) {
  showError("SPEECH NOT SUPPORTED — use Chrome or Edge");
} else {
  recognition = new SpeechRecognition();
  recognition.continuous     = true;
  recognition.interimResults = true;
  recognition.lang           = "en-US";

  const autoRestart = true;

  recognition.onend = () => {
    if (autoRestart) {
      try { recognition.start(); } catch(e) {}
    }
  };

  recognition.onerror = (e) => {
    if (e.error === "no-speech") return;
    if (e.error === "not-allowed") { showError("MIC ACCESS DENIED"); return; }
    showError("ERR: " + e.error.toUpperCase());
  };

  recognition.onresult = (e) => {
    let interim = "";
    let finalText = "";

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalText += t + " ";
      else interim += t;
    }

    const combined = (finalText + " " + interim).toLowerCase().trim();
    const normalized = (" " + combined.replace(/[^\w\s]/g, " ") + " ")
      .replace(/\s+/g, " ");

    let activated = false;
    for (const player of players) {
      if (player.aliases.some(alias => normalized.includes(" " + alias + " "))) {
        showSlide(player.file, player.name);
        activated = true;
        break;
      }
    }

    if (subtitlesEnabled && combined) {
      setSubtitle(combined, activated);
    }
  };

  try { recognition.start(); } catch(e) {}
}
